<!DOCTYPE html>
<html>
  <head>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 280px;
        padding: 20px;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #1a1b2e;
        color: #e2e8f0;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .header h3 {
        background: linear-gradient(135deg, #e8a838, #d48c1a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 16px;
        font-weight: 700;
      }
      .header span {
        font-size: 12px;
        color: #64748b;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: rgba(232, 168, 56, 0.08);
        border: 1px solid rgba(232, 168, 56, 0.15);
        border-radius: 10px;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 16px;
      }
      .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #e8a838, #d48c1a);
        color: white;
        box-shadow: 0 4px 12px rgba(232, 168, 56, 0.25);
        transition: all 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(232, 168, 56, 0.35);
      }
      button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h3>AI Migration</h3>
      <span>v2.0</span>
    </div>
    <div class="status">
      <div class="dot"></div>
      Extension active
    </div>
    <button id="openDashboard">Open Dashboard</button>
    <script src="popup.js"></script>
  </body>
</html>
